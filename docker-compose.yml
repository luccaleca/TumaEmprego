services:
  postgres:
    image: postgres:16-alpine
    container_name: tuma-emprego-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tuma
      POSTGRES_PASSWORD: tuma
      POSTGRES_DB: tuma_emprego
    volumes:
      - tuma_emprego_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuma -d tuma_emprego"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tuma_emprego_pg:
