# Banco de conteúdo — alimenta as variações de currículo por segmento.
# Na primeira leitura a API copia para banco.yml (gitignored). Substitua pelos seus dados reais.

experiencias:
  - id: empresa-exemplo
    empresa: Empresa Exemplo Ltda
    periodo: Jan/2024 – Dez/2024
    local: Cidade – UF
    segmentos:
      - dados-bi-analytics
      - desenvolvimento
    titulo_por_segmento:
      dados-bi-analytics: Empresa Exemplo — Estagiário(a) em Análise de Dados
      desenvolvimento: Empresa Exemplo — Estagiário(a) em Desenvolvimento
    nota_por_segmento:
      dados-bi-analytics: Foco em SQL, Python e dashboards.
      desenvolvimento: Foco em React, Node.js e integrações internas.
    bullets:
      - texto: Consultas SQL e relatórios.
        texto_por_segmento:
          dados-bi-analytics: Desenvolvi **consultas SQL** para relatórios semanais usados pelo time comercial.
          desenvolvimento: Modelei **consultas SQL** consumidas por scripts e rotinas da operação.
        segmentos:
          - dados-bi-analytics
          - desenvolvimento
      - texto: Dashboard em Power BI.
        texto_por_segmento:
          dados-bi-analytics: Construí dashboards em **Power BI** com KPIs do negócio.
        segmentos:
          - dados-bi-analytics

projetos:
  - id: projeto-portfolio
    nome: Projeto de Portfólio
    segmentos:
      - desenvolvimento
      - dados-bi-analytics
    subtitulo_por_segmento:
      desenvolvimento: App web full stack
      dados-bi-analytics: Painel de métricas
    stack_por_segmento:
      desenvolvimento: Next.js, Node.js, PostgreSQL
      dados-bi-analytics: SQL, Python, Power BI
    bullets_por_segmento:
      desenvolvimento:
        - API REST e front em **Next.js**
        - Deploy e versionamento com **Git**
      dados-bi-analytics:
        - Pipeline simples de **ETL** em Python
        - Dashboard de KPIs para acompanhamento

cursos:
  - id: curso-sql
    titulo: SQL para Análise de Dados
    instrutor: Instrutor Exemplo
    plataforma: Udemy
    segmentos:
      - dados-bi-analytics
    ordem: 1
    concluido: true

ferramentas:
  - id: python
    nome: Python
    categoria: Dados / back-end
    segmentos: [dados-bi-analytics, desenvolvimento]
  - id: sql
    nome: SQL
    categoria: Dados / back-end
    segmentos: [dados-bi-analytics]
  - id: react
    nome: React
    categoria: Front-end
    segmentos: [desenvolvimento]

# Legado — usado só se ferramentas estiver vazio
competencias:
  dados-bi-analytics: |
    - **Dados:** Python, SQL, Excel
    - **BI:** Power BI, dashboards, KPIs
    - **Idiomas:** Português (nativo), Inglês (intermediário)
  desenvolvimento: |
    - **Front-end:** React, Next.js, JavaScript
    - **Back-end:** Node.js, REST APIs
    - **Idiomas:** Português (nativo), Inglês (intermediário)
