# Banco de conteúdo — alimenta as variações de currículo por segmento.
# Na primeira leitura a API copia para banco.yml (gitignored). Substitua pelos seus dados reais.

experiencias:
  - id: empresa-exemplo
    empresa: Empresa Exemplo Ltda
    periodo: Jan/2024 – Dez/2024
    local: Cidade – UF
    segmentos:
      - dados-bi-analytics
      - desenvolvimento
    titulo_por_segmento:
      dados-bi-analytics: Empresa Exemplo — Estagiário(a) em Análise de Dados
      desenvolvimento: Empresa Exemplo — Estagiário(a) em Desenvolvimento
    nota_por_segmento:
      dados-bi-analytics: Foco em SQL, Python e dashboards.
      desenvolvimento: Foco em React, Node.js e integrações internas.
    bullets:
      - texto: Consultas SQL e relatórios.
        texto_por_segmento:
          dados-bi-analytics: Desenvolvi **consultas SQL** para relatórios semanais usados pelo time comercial.
          desenvolvimento: Modelei **consultas SQL** consumidas por scripts e rotinas da operação.
        segmentos:
          - dados-bi-analytics
          - desenvolvimento
      - texto: Dashboard em Power BI.
        texto_por_segmento:
          dados-bi-analytics: Construí dashboards em **Power BI** com KPIs do negócio.
        segmentos:
          - dados-bi-analytics

projetos:
  - id: projeto-portfolio
    nome: Projeto de Portfólio
    segmentos:
      - desenvolvimento
      - dados-bi-analytics
    resumo_por_segmento:
      desenvolvimento: App web full stack para demonstrar entregas de produto
      dados-bi-analytics: Painel de métricas para acompanhar indicadores do projeto
    stack_uso_por_segmento:
      desenvolvimento:
        - Next.js — interface e rotas do app
        - Node.js — API REST e regras de negócio
        - PostgreSQL — persistência dos dados do sistema
        - Git — versionamento e deploy
      dados-bi-analytics:
        - Python — pipeline simples de ETL dos dados
        - SQL — consultas e modelagem para o painel
        - Power BI — dashboard de KPIs para acompanhamento
    bullets_por_segmento:
      desenvolvimento:
        - Entreguei app web full stack com rotas, API e persistência em PostgreSQL.
        - Versionamento e deploy com Git em ambiente de demonstração do portfólio.
      dados-bi-analytics:
        - Montei pipeline simples de ETL e painel de KPIs para acompanhar o projeto.

cursos:
  - id: curso-sql
    titulo: SQL para Análise de Dados
    instrutor: Midori Ishizuka
    plataforma: Udemy
    segmentos:
      - dados-bi-analytics
    ordem: 1
    concluido: true
  - id: curso-ga4
    titulo: Google Analytics 4
    instrutor: Google Skillshop
    plataforma: Google
    segmentos:
      - dados-bi-analytics
      - marketing-growth
    ordem: 2
    concluido: true
  - id: curso-react-alura
    titulo: Formação React
    instrutor: Alura
    plataforma: Alura
    segmentos:
      - desenvolvimento
    ordem: 1
    concluido: true
  - id: curso-google-ads
    titulo: Google Ads — Certificação de Pesquisa
    instrutor: Google Skillshop
    plataforma: Google
    segmentos:
      - marketing-growth
    ordem: 1
    concluido: false

ferramentas:
  - id: python
    nome: Python
    categoria: Dados / back-end
    segmentos: [dados-bi-analytics, desenvolvimento]
  - id: sql
    nome: SQL
    categoria: Dados / back-end
    segmentos: [dados-bi-analytics]
  - id: react
    nome: React
    categoria: Front-end
    segmentos: [desenvolvimento]

# Legado — usado só se ferramentas estiver vazio
competencias:
  dados-bi-analytics: |
    - **Dados:** Python, SQL, Excel
    - **BI:** Power BI, dashboards, KPIs
    - **Idiomas:** Português (nativo), Inglês (intermediário)
  desenvolvimento: |
    - **Front-end:** React, Next.js, JavaScript
    - **Back-end:** Node.js, REST APIs
    - **Idiomas:** Português (nativo), Inglês (intermediário)
