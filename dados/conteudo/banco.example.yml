# Banco de conteúdo — alimenta as variações de currículo por segmento.
# Copie para banco.yml (gitignored) ou deixe a API criar na primeira leitura.

experiencias:
  - id: empresa-exemplo
    empresa: Empresa Exemplo Ltda
    periodo: Fev/2025 – Set/2025
    local: São Paulo – SP
    segmentos:
      - dados-bi-analytics
      - desenvolvimento
      - marketing-growth
      - ia-ml
    titulo_por_segmento:
      dados-bi-analytics: Empresa Exemplo Ltda — Assistente de Análise de Dados
      desenvolvimento: Empresa Exemplo Ltda — Assistente de Desenvolvimento de Software
      marketing-growth: Empresa Exemplo Ltda — Assistente de Growth / Performance
      ia-ml: Empresa Exemplo Ltda — Análise de Dados para Produto e Operação
    nota_por_segmento:
      dados-bi-analytics: Foco em SQL, Python, Power BI, modelagem relacional e KPIs comerciais.
      desenvolvimento: Foco em React, Next.js, Node.js, JavaScript, SQL e automações que sustentaram a operação.
      marketing-growth: Foco em Google Ads, Meta Ads, segmentação de público, KPIs e Power BI.
      ia-ml: Foco em base analítica (SQL, Python) para leitura de performance e priorização.
    bullets:
      - texto: Consultas SQL e base relacional de clientes e vendas.
        texto_por_segmento:
          dados-bi-analytics: Desenvolvi **consultas SQL** para extração e análise de dados de vendas, gerando relatórios semanais usados pela equipe comercial na tomada de decisão.
          desenvolvimento: Modelei **consultas SQL** sobre base relacional de clientes e vendas, consumidas por **scripts Python/Node** e ferramentas internas.
          ia-ml: Estruturei **consultas SQL** e datasets de vendas/clientes como base para análises e priorização de ações.
        segmentos:
          - dados-bi-analytics
          - desenvolvimento
          - ia-ml
      - texto: Tratamento de dados com Python.
        texto_por_segmento:
          dados-bi-analytics: Tratei e transformei bases em CSV com **Python** e **Pandas**, estruturando dados brutos para análise de performance e segmentação de público.
          desenvolvimento: Automatizei rotinas em **Python** para limpar, cruzar e disponibilizar dados que alimentavam reports e fluxos da operação.
        segmentos:
          - dados-bi-analytics
          - desenvolvimento
      - texto: Dashboards Power BI e KPIs comerciais.
        texto_por_segmento:
          dados-bi-analytics: Construí dashboards em **Power BI** para acompanhamento de KPIs comerciais, apoiando a identificação de segmentos mais rentáveis.
          marketing-growth: Modelei dashboards no **Power BI** com KPIs comerciais, funil de conversão e leitura de performance para campanhas.
        segmentos:
          - dados-bi-analytics
          - marketing-growth
      - texto: Interfaces e entregas web com React e Next.js.
        segmentos:
          - desenvolvimento
        texto_por_segmento:
          desenvolvimento: Desenvolvi e mantive interfaces em **React** e **Next.js** para ferramentas internas e fluxos da operação, com **JavaScript** e **Git** no dia a dia.
      - texto: Automações e integrações com Node.js.
        segmentos:
          - desenvolvimento
        texto_por_segmento:
          desenvolvimento: Implementei automações e rotinas em **Node.js** para integrar dados de vendas, campanhas e relatórios recorrentes da equipe.
      - texto: Campanhas Google Ads e Meta Ads.
        segmentos:
          - marketing-growth
        texto_por_segmento:
          marketing-growth: Apoiei campanhas de **Google Ads** e **Meta Ads** com leitura de performance, segmentação de público e ajustes orientados a dados.
      - texto: Segmentação de público e growth.
        segmentos:
          - marketing-growth
          - dados-bi-analytics
        texto_por_segmento:
          marketing-growth: Conduzi análises de segmentação de público e sazonalidade para direcionar ações de **growth** e lançamentos comerciais.
          dados-bi-analytics: Realizei análise de dados para foco em público mais relevante em lançamento, apoiando direcionamento estratégico da equipe.
      - texto: Modelagem relacional da base de clientes.
        segmentos:
          - dados-bi-analytics
          - desenvolvimento
        texto_por_segmento:
          dados-bi-analytics: Modelei estruturas de dados e criei tabelas relacionais para consulta e segmentação da base de clientes, facilitando análises recorrentes.
          desenvolvimento: Participei da **modelagem relacional** da base de clientes e das consultas que sustentavam scripts, reports e rotinas da operação.
      - texto: Impacto de ~20% na receita do período.
        segmentos:
          - marketing-growth
          - dados-bi-analytics
        texto_por_segmento:
          marketing-growth: Contribuí para aumento de **~20% na receita** do período (métrica de exemplo) com insights sobre mix de produtos, público e sazonalidade.
          dados-bi-analytics: Contribuí para crescimento de **~20% na receita** (métrica de exemplo) com análises de mix de produtos e segmentos mais rentáveis.

projetos:
  - id: tumaia
    nome: TumaIA
    segmentos:
      - desenvolvimento
      - marketing-growth
      - ia-ml
    ordem_por_segmento:
      marketing-growth: 1
      desenvolvimento: 1
      ia-ml: 2
    subtitulo_por_segmento:
      marketing-growth: Automação de posts no Instagram
      desenvolvimento: SaaS Next.js + API + IA
      ia-ml: IA generativa em produção
    stack_por_segmento:
      marketing-growth: WhatsApp, n8n, Instagram API, Supabase, IA generativa
      desenvolvimento: Next.js (App Router), React, Node/Express, Supabase, Ollama, LLM
      ia-ml: LLM, Replicate/FLUX, Supabase, n8n, Next.js
    bullets_por_segmento:
      marketing-growth:
        - "SaaS para PMEs: pedido pelo **WhatsApp** → IA gera criativo + legenda → aprovação → **publicação no Instagram**."
        - Automatizei o fluxo com **n8n** (webhook, contexto de marca no Supabase, aprovação antes de publicar).
        - Produto **WhatsApp-first** — painel web só configura marca, catálogo e mídias.
      desenvolvimento:
        - "Monorepo **Next.js (App Router)** + **Express** multi-tenant com auth e rotas de IA."
        - Integrei **Ollama** (API OpenAI-compatible) e geração de imagem via Replicate no pipeline do produto.
        - Persistência e contexto de marca em **Supabase**; automações expostas para **n8n**.
      ia-ml:
        - Pipeline de **IA generativa** (imagem + legenda) a partir do contexto da empresa.
        - Orquestração n8n + APIs de publicação; limites e billing configuráveis no backend.

  - id: tumacore
    nome: TumaCore
    segmentos:
      - dados-bi-analytics
      - desenvolvimento
      - ia-ml
    ordem_por_segmento:
      dados-bi-analytics: 1
      ia-ml: 1
      desenvolvimento: 2
    subtitulo_por_segmento:
      dados-bi-analytics: Centro de dados e BI
      desenvolvimento: FastAPI + Next.js + Postgres
      ia-ml: RAG + Chat SQL
    stack_por_segmento:
      dados-bi-analytics: Python, FastAPI, Next.js, PostgreSQL, Supabase, dashboards, KPIs
      desenvolvimento: Python, FastAPI, Next.js, PostgreSQL, Chroma, LLM
      ia-ml: Python, FastAPI, RAG (Chroma), Ollama, OpenRouter, Gemini, PostgreSQL
    bullets_por_segmento:
      dados-bi-analytics:
        - "**Centro de dados** do ecossistema TumaIA — KPIs, evolução de pedidos, segmentos e regiões sobre Postgres/Supabase."
        - "**Chat SQL**: pergunta em português → leitura do schema → SQL PostgreSQL executável."
        - Dashboards de analytics (saúde do produto, performance, tendências).
      desenvolvimento:
        - API **FastAPI** + painel **Next.js** com proxy e auth Supabase.
        - Leitura dinâmica de `information_schema` para consultas assistidas a dados.
      ia-ml:
        - **RAG (Chroma)** + LLM (Ollama / OpenRouter / Gemini) sobre PostgreSQL.
        - Chat em linguagem natural com injeção de schema e cache configurável.

  - id: tuma-emprego
    nome: Tuma Emprego
    segmentos:
      - desenvolvimento
      - dados-bi-analytics
    ordem_por_segmento:
      desenvolvimento: 2
      dados-bi-analytics: 2
    subtitulo_por_segmento:
      desenvolvimento: Hub de candidaturas
      dados-bi-analytics: Segmentação e adaptação de CV
    stack_por_segmento:
      desenvolvimento: Next.js, React, PostgreSQL, Prisma, YAML
      dados-bi-analytics: PostgreSQL, YAML, segmentação
    bullets_por_segmento:
      desenvolvimento:
        - Desenvolvo hub local com **Next.js**, **PostgreSQL + Prisma** e configs YAML.
        - Implementei adaptação de CV por vaga/segmento e banco de respostas.
      dados-bi-analytics:
        - Ferramenta com **PostgreSQL** e perfis de busca (segmentos, senioridade) para priorizar candidaturas.
        - Motor de adaptação de CV por segmento com keywords e reordenação de conteúdo.

